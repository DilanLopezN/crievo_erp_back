services:
  postgres:
    image: postgres:17-alpine
    container_name: erp-saas-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: erp_saas
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
